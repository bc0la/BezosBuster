<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BezosBuster report</title>
<style>
  :root { color-scheme: dark; }
  body { font: 14px/1.4 system-ui, sans-serif; margin: 0; background: #111; color: #eee; }
  header { padding: 16px 24px; border-bottom: 1px solid #333; background: #181818; }
  header h1 { margin: 0 0 8px; font-size: 18px; }
  nav { display: flex; flex-wrap: wrap; gap: 4px; }
  nav button { background: #222; color: #eee; border: 1px solid #333; padding: 6px 12px; cursor: pointer; font: inherit; }
  nav button.active { background: #2a4d69; border-color: #3a6d99; }
  main { padding: 16px 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th, td { padding: 6px 8px; border-bottom: 1px solid #222; text-align: left; vertical-align: top; overflow: hidden; text-overflow: ellipsis; }
  th { background: #1a1a1a; position: sticky; top: 0; cursor: pointer; user-select: none; }
  th .resizer { position: absolute; right: 0; top: 0; width: 5px; height: 100%; cursor: col-resize; background: transparent; }
  th .resizer:hover, th .resizer.active { background: #3a6d99; }
  tr:hover { background: #1a1a1a; }
  tr.hidden-row { display: none; }
  .sev-critical { color: #ff5b5b; font-weight: bold; }
  .sev-high     { color: #ff9a3c; font-weight: bold; }
  .sev-medium   { color: #ffd166; }
  .sev-low      { color: #99d98c; }
  .sev-info     { color: #7f8bd6; }
  details { margin: 0; }
  pre { white-space: pre-wrap; word-break: break-word; background: #0c0c0c; padding: 8px; border: 1px solid #222; max-height: 400px; overflow: auto; }
  .summary { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .summary div { background: #1a1a1a; padding: 8px 14px; border: 1px solid #2a2a2a; }
  input[type=search] { background: #0c0c0c; color: #eee; border: 1px solid #333; padding: 6px 8px; width: 300px; margin-bottom: 8px; }
  .curl-block { position: relative; margin: 4px 0; }
  .curl-block code { display: block; background: #0a0a0a; color: #7ec; padding: 6px 60px 6px 8px; border: 1px solid #333; font: 12px/1.4 monospace; white-space: pre-wrap; word-break: break-all; }
  .curl-block button { position: absolute; top: 4px; right: 4px; background: #333; color: #eee; border: 1px solid #555; padding: 2px 8px; cursor: pointer; font-size: 11px; }
  .curl-block button:hover { background: #555; }
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .toolbar .btn { background: #2a4d69; color: #eee; border: 1px solid #3a6d99; padding: 6px 14px; cursor: pointer; font: inherit; }
  .toolbar .btn:hover { background: #3a6d99; }
  .toolbar .btn-warn { background: #693a2a; border-color: #994d3a; }
  .toolbar .btn-warn:hover { background: #994d3a; }
  .hide-btn { background: #333; color: #999; border: 1px solid #555; padding: 1px 6px; cursor: pointer; font-size: 11px; margin-left: 4px; }
  .hide-btn:hover { background: #555; color: #eee; }
  .hidden-count { color: #777; font-size: 12px; margin-left: 8px; }
</style>
</head>
<body>
<header>
  <h1>BezosBuster report</h1>
  <nav id="tabs"></nav>
</header>
<main>
  <div class="summary" id="summary"></div>
  <div class="toolbar">
    <input type="search" id="filter" placeholder="filter...">
    <button class="btn" id="export-curls" onclick="exportCurls()" style="display:none">Export curls</button>
    <button class="btn" id="export-raw" onclick="exportRaw()" style="display:none">Export JSON</button>
    <button class="btn" id="export-assets" onclick="exportAssets()" style="display:none">Export assets</button>
    <button class="btn btn-warn" id="restore-hidden" onclick="restoreHidden()" style="display:none">Restore hidden</button>
    <span class="hidden-count" id="hidden-count"></span>
  </div>
  <div id="content"></div>
</main>
<script>
let currentModule = "";
let allFindings = [];

// Hidden findings stored in localStorage keyed by finding ID.
const HIDDEN_KEY = 'bb_hidden_findings';
function getHidden() {
  try { return JSON.parse(localStorage.getItem(HIDDEN_KEY) || '{}'); } catch { return {}; }
}
function setHidden(h) { localStorage.setItem(HIDDEN_KEY, JSON.stringify(h)); }
function hideFinding(id) {
  const h = getHidden(); h[id] = true; setHidden(h);
  const row = document.getElementById('row-' + id);
  if (row) row.classList.add('hidden-row');
  updateHiddenUI();
}
function restoreHidden() {
  if (!currentModule) { const h = getHidden(); for (const k in h) delete h[k]; setHidden(h); }
  else {
    const h = getHidden();
    for (const f of allFindings) { if (f.module === currentModule || !currentModule) delete h[f.id]; }
    setHidden(h);
  }
  render();
}
function updateHiddenUI() {
  const h = getHidden();
  const relevant = allFindings.filter(f => h[f.id]);
  const countEl = document.getElementById('hidden-count');
  const restoreEl = document.getElementById('restore-hidden');
  if (relevant.length > 0) {
    countEl.textContent = relevant.length + ' hidden';
    restoreEl.style.display = '';
  } else {
    countEl.textContent = '';
    restoreEl.style.display = 'none';
  }
}

async function loadSummary() {
  const r = await fetch('/api/summary').then(r => r.json());
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  const mkBtn = (label, mod) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.onclick = () => { currentModule = mod; loadFindings(); renderTabs(); };
    if (mod === currentModule) b.classList.add('active');
    return b;
  };
  tabs.appendChild(mkBtn('All', ''));
  (r.modules || []).forEach(m => tabs.appendChild(mkBtn(`${m.module} (${m.count})`, m.module)));
  const s = document.getElementById('summary');
  s.innerHTML = '';
  Object.entries(r.severity || {}).forEach(([k, v]) => {
    const d = document.createElement('div');
    d.className = 'sev-' + k;
    d.textContent = `${k}: ${v}`;
    s.appendChild(d);
  });
}

function renderTabs() {
  document.querySelectorAll('#tabs button').forEach(b => {
    b.classList.toggle('active', (b.textContent.startsWith('All') ? '' : b.textContent.split(' ')[0]) === currentModule);
  });
}

async function loadFindings() {
  currentTable = null; // reset table header on module switch
  const qs = currentModule ? `?module=${encodeURIComponent(currentModule)}` : '';
  allFindings = await fetch('/api/findings' + qs).then(r => r.json()) || [];
  document.getElementById('export-curls').style.display =
    ['apigw_lambda', 'public_sqs', 'public_sns'].includes(currentModule) ? '' : 'none';
  document.getElementById('export-raw').style.display = currentModule ? '' : 'none';
  document.getElementById('export-assets').style.display = currentModule ? '' : 'none';
  render();
}

// Persistent column widths survive re-renders.
const colDefs = [
  {name: '', width: 30},
  {name: 'severity', width: 80},
  {name: 'account', width: 110},
  {name: 'region', width: 120},
  {name: 'module', width: 130},
  {name: 'title', width: 400},
  {name: 'resource', width: 250},
  {name: 'raw', width: 50},
  {name: 'detail', width: 80}
];
const colWidths = colDefs.map(c => c.width);
let currentTable = null;

function buildTableHeader() {
  const tbl = document.createElement('table');
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  colDefs.forEach((col, ci) => {
    const th = document.createElement('th');
    th.textContent = col.name;
    th.style.width = colWidths[ci] + 'px';
    th.style.position = 'relative';
    const resizer = document.createElement('div');
    resizer.className = 'resizer';
    resizer.addEventListener('mousedown', e => {
      e.preventDefault();
      const startX = e.pageX;
      const startW = colWidths[ci]; // use stored width, not rendered
      resizer.classList.add('active');
      const onMove = e2 => {
        const w = Math.max(30, startW + e2.pageX - startX);
        th.style.width = w + 'px';
        colWidths[ci] = w;
      };
      const onUp = () => {
        resizer.classList.remove('active');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    th.appendChild(resizer);
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  tbl.appendChild(thead);
  return tbl;
}

function render() {
  const filter = document.getElementById('filter').value.toLowerCase();
  const hidden = getHidden();
  const rows = allFindings.filter(f => !filter || JSON.stringify(f).toLowerCase().includes(filter));
  const content = document.getElementById('content');
  if (rows.length === 0) { content.textContent = 'no findings'; currentTable = null; updateHiddenUI(); return; }

  // Reuse existing table header or build new one.
  if (!currentTable || !content.contains(currentTable)) {
    currentTable = buildTableHeader();
    content.innerHTML = '';
    content.appendChild(currentTable);
  }
  // Remove old tbody if any.
  const oldTbody = currentTable.querySelector('tbody');
  if (oldTbody) oldTbody.remove();

  const tbody = document.createElement('tbody');
  const frag = document.createDocumentFragment();
  for (const f of rows) {
    const tr = document.createElement('tr');
    tr.id = 'row-' + f.id;
    if (hidden[f.id]) tr.classList.add('hidden-row');

    // Hide button cell.
    const hideCell = document.createElement('td');
    const hideBtn = document.createElement('button');
    hideBtn.className = 'hide-btn';
    hideBtn.textContent = 'x';
    hideBtn.title = 'Hide this finding';
    hideBtn.onclick = () => hideFinding(f.id);
    hideCell.appendChild(hideBtn);
    tr.appendChild(hideCell);

    // Severity.
    const sevCell = document.createElement('td');
    sevCell.className = 'sev-' + f.severity;
    sevCell.textContent = f.severity;
    tr.appendChild(sevCell);

    // Account.
    const acctCell = document.createElement('td');
    acctCell.textContent = f.account_id;
    tr.appendChild(acctCell);

    // Region.
    const regCell = document.createElement('td');
    regCell.textContent = f.region;
    tr.appendChild(regCell);

    // Module.
    const modCell = document.createElement('td');
    modCell.textContent = f.module;
    tr.appendChild(modCell);

    // Title + curls.
    const titleCell = document.createElement('td');
    titleCell.textContent = f.title;
    if (f.detail && f.detail.curl) {
      const curls = Array.isArray(f.detail.curl) ? f.detail.curl : [f.detail.curl];
      for (const c of curls) {
        const block = document.createElement('div');
        block.className = 'curl-block';
        const code = document.createElement('code');
        code.textContent = c;
        block.appendChild(code);
        const btn = document.createElement('button');
        btn.textContent = 'copy';
        btn.onclick = () => navigator.clipboard.writeText(c).then(() => { btn.textContent = 'copied!'; setTimeout(() => btn.textContent = 'copy', 1500); });
        block.appendChild(btn);
        titleCell.appendChild(block);
      }
    }
    tr.appendChild(titleCell);

    // Resource.
    const resCell = document.createElement('td');
    resCell.textContent = f.resource_arn || '';
    tr.appendChild(resCell);

    // Raw.
    const rawCell = document.createElement('td');
    if (f.raw_output_path) {
      const a = document.createElement('a');
      a.href = f.raw_output_path;
      a.target = '_blank';
      a.textContent = 'browse';
      rawCell.appendChild(a);
    }
    tr.appendChild(rawCell);

    // Detail.
    const detCell = document.createElement('td');
    const det = document.createElement('details');
    const sum = document.createElement('summary');
    sum.textContent = 'show';
    det.appendChild(sum);
    const pre = document.createElement('pre');
    pre.textContent = JSON.stringify(f.detail, null, 2);
    det.appendChild(pre);
    detCell.appendChild(det);
    tr.appendChild(detCell);

    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
  currentTable.appendChild(tbody);
  updateHiddenUI();
}

function exportCurls() {
  const lines = [];
  const hidden = getHidden();
  for (const f of allFindings) {
    if (hidden[f.id]) continue;
    if (!f.detail || !f.detail.curl) continue;
    const curls = Array.isArray(f.detail.curl) ? f.detail.curl : [f.detail.curl];
    lines.push('# ' + f.title + ' [' + f.severity + '] ' + f.account_id + ' ' + f.region);
    for (const c of curls) lines.push(c);
    lines.push('');
  }
  if (lines.length === 0) { alert('No curl commands found in visible findings.'); return; }
  const blob = new Blob([lines.join('\n')], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bezosbuster-curls.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportRaw() {
  const hidden = getHidden();
  const data = allFindings.filter(f => !hidden[f.id]);
  if (data.length === 0) { alert('No visible findings to export.'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bezosbuster-' + (currentModule || 'all') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function extractAsset(f) {
  const d = f.detail || {};
  const mod = f.module;
  // Smart per-module asset extraction.
  switch (mod) {
    case 'apigw_lambda':
      // Function URLs or API invoke URLs.
      if (d.url) return d.url;
      if (d.curl) {
        const curls = Array.isArray(d.curl) ? d.curl : [d.curl];
        // Extract URL from curl command.
        const urls = curls.map(c => { const m = c.match(/'([^']+)'/); return m ? m[1] : null; }).filter(Boolean);
        if (urls.length) return urls.join('\n');
      }
      if (d.api_id && d.path) return d.api_id + ' ' + (d.method||'') + ' ' + d.path;
      return f.resource_arn || '';
    case 'public_sqs':
      return d.queue_url || f.resource_arn || '';
    case 'public_sns':
      return d.topic_arn || f.resource_arn || '';
    case 'cognito':
      if (d.hosted_ui_url) return d.hosted_ui_url;
      if (d.pool_id) return d.pool_id + (d.client_id ? '/' + d.client_id : '');
      if (d.identity_pool_id) return d.identity_pool_id;
      return f.resource_arn || '';
    case 'secrets_scan':
      return d.source || f.resource_arn || '';
    case 'ec2_userdata':
      return d.instance_id || f.resource_arn || '';
    case 'lambda_env':
      return d.function || f.resource_arn || '';
    case 'codebuild_env':
      return d.project || f.resource_arn || '';
    case 'ssm_commands':
      return d.document + ' (' + (d.execution_count||1) + 'x)';
    case 'public_ecr':
      return d.uri || f.resource_arn || '';
    case 'ecs_ecr_taskdefs':
      return d.family || f.resource_arn || '';
    case 'iam_integrations':
      return d.role || d.arn || f.resource_arn || '';
    default:
      return f.resource_arn || f.title || '';
  }
}

function exportAssets() {
  const hidden = getHidden();
  const seen = new Set();
  const lines = [];
  for (const f of allFindings) {
    if (hidden[f.id]) continue;
    const asset = extractAsset(f);
    if (!asset) continue;
    // Each asset line could be multi-line (apigw curls), split and dedupe each.
    for (const line of asset.split('\n')) {
      const trimmed = line.trim();
      if (trimmed && !seen.has(trimmed)) {
        seen.add(trimmed);
        lines.push(trimmed);
      }
    }
  }
  if (lines.length === 0) { alert('No assets found in visible findings.'); return; }
  const blob = new Blob([lines.join('\n') + '\n'], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bezosbuster-' + (currentModule || 'all') + '-assets.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('filter').addEventListener('input', render);
loadSummary().then(loadFindings);
</script>
</body>
</html>
